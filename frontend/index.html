<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>年假查询系统 v1.3</title>
    <script src="https://lf1-cdn-tos.bytegoofy.com/goofy/lark/op/h5-js-sdk-1.5.29.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            color: #333;
            line-height: 1.6;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .header {
            text-align: center;
            padding: 30px 0;
        }
        
        .header h1 {
            font-size: 24px;
            color: #1a1a1a;
        }
        
        .user-info {
            text-align: center;
            padding: 12px;
            background: white;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 14px;
            color: #666;
        }
        
        .user-info .name {
            font-weight: 600;
            color: #333;
        }
        
        .user-info .badge {
            display: inline-block;
            padding: 2px 8px;
            background: #667eea;
            color: white;
            border-radius: 4px;
            font-size: 12px;
            margin-left: 8px;
        }
        
        .card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        
        /* v1.3 三栏余额卡片 */
        .balance-card {
            text-align: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .balance-card .label {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 8px;
        }
        
        .balance-card .number {
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 8px;
        }
        
        .balance-card .number.negative {
            color: #ff6b6b;
        }
        
        .balance-card .sub {
            font-size: 14px;
            opacity: 0.9;
        }
        
        /* v1.3 三栏布局 */
        .stats-grid-3 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 12px;
            margin-bottom: 16px;
        }
        
        .stat-item {
            background: white;
            border-radius: 12px;
            padding: 16px 8px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        
        .stat-item .label {
            font-size: 12px;
            color: #999;
            margin-bottom: 8px;
        }
        
        .stat-item .number {
            font-size: 24px;
            font-weight: bold;
            color: #333;
        }
        
        .stat-item .number.negative {
            color: #ff6b6b;
        }
        
        .stat-item .note {
            font-size: 10px;
            color: #ff6b6b;
            margin-top: 4px;
        }
        
        .menu-list {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        
        .menu-item {
            display: flex;
            align-items: center;
            padding: 16px 20px;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .menu-item:last-child {
            border-bottom: none;
        }
        
        .menu-item:hover {
            background: #f8f8f8;
        }
        
        .menu-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 16px;
            font-size: 20px;
        }
        
        .menu-icon.blue { background: #e3f2fd; }
        .menu-icon.green { background: #e8f5e9; }
        .menu-icon.orange { background: #fff3e0; }
        .menu-icon.purple { background: #f3e5f5; }
        .menu-icon.red { background: #ffebee; }
        
        .menu-text {
            flex: 1;
        }
        
        .menu-title {
            font-size: 16px;
            font-weight: 500;
            color: #333;
        }
        
        .menu-desc {
            font-size: 12px;
            color: #999;
            margin-top: 2px;
        }
        
        .menu-arrow {
            color: #ccc;
            font-size: 20px;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #999;
        }
        
        .error {
            background: #ffebee;
            color: #c62828;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 16px;
        }
        
        .warning-box {
            background: #fff3e0;
            border-left: 4px solid #ff9800;
            padding: 12px 16px;
            margin-bottom: 16px;
            border-radius: 4px;
            font-size: 13px;
            color: #e65100;
        }
        
        /* HR 员工选择器 */
        .employee-selector {
            margin-bottom: 20px;
        }
        
        .employee-selector select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            background: white;
        }
        
        /* 详情弹窗 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: white;
            border-radius: 12px;
            width: 90%;
            max-width: 500px;
            max-height: 80vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        
        .modal-header {
            padding: 20px;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .modal-title {
            font-size: 18px;
            font-weight: 600;
        }
        
        .modal-close {
            background: none;
            border: none;
            font-size: 24px;
            color: #999;
            cursor: pointer;
        }
        
        .modal-body {
            padding: 20px;
            overflow-y: auto;
        }
        
        /* 请假记录列表 */
        .leave-item {
            padding: 16px;
            border-bottom: 1px solid #f5f5f5;
        }
        
        .leave-item:last-child {
            border-bottom: none;
        }
        
        .leave-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }
        
        .leave-type {
            font-weight: 500;
            color: #333;
        }
        
        .leave-duration {
            color: #667eea;
            font-weight: 600;
        }
        
        .leave-date {
            font-size: 13px;
            color: #666;
            margin-bottom: 4px;
        }
        
        .leave-status {
            font-size: 12px;
            padding: 2px 8px;
            border-radius: 4px;
            display: inline-block;
        }
        
        .leave-status.approved {
            background: #e8f5e9;
            color: #2e7d32;
        }
        
        .leave-status.withdrawn {
            background: #fff3e0;
            color: #ef6c00;
        }
        
        .leave-reason {
            font-size: 13px;
            color: #999;
            margin-top: 4px;
        }
        
        /* 规则说明 */
        .rule-section {
            margin-bottom: 20px;
        }
        
        .rule-title {
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            padding-bottom: 8px;
            border-bottom: 2px solid #667eea;
        }
        
        .rule-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #f5f5f5;
        }
        
        .rule-label {
            color: #666;
        }
        
        .rule-value {
            font-weight: 500;
            color: #333;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }
        
        /* 调整记录 */
        .adjustment-item {
            padding: 12px;
            border-bottom: 1px solid #f5f5f5;
        }
        
        .adjustment-item:last-child {
            border-bottom: none;
        }
        
        .adjustment-amount {
            font-weight: 600;
            font-size: 16px;
        }
        
        .adjustment-amount.positive {
            color: #4caf50;
        }
        
        .adjustment-amount.negative {
            color: #f44336;
        }
        
        .adjustment-meta {
            font-size: 12px;
            color: #999;
            margin-top: 4px;
        }
        
        /* 按钮 */
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .btn-primary {
            background: #667eea;
            color: white;
        }
        
        .btn-primary:hover {
            background: #5a6fd6;
        }
        
        .btn-secondary {
            background: #f5f5f5;
            color: #333;
        }
        
        .btn-secondary:hover {
            background: #e0e0e0;
        }
        
        .btn-danger {
            background: #f44336;
            color: white;
        }
        
        .btn-group {
            display: flex;
            gap: 12px;
            margin-top: 16px;
        }
        
        /* 表单 */
        .form-group {
            margin-bottom: 16px;
        }
        
        .form-label {
            display: block;
            font-size: 14px;
            color: #666;
            margin-bottom: 8px;
        }
        
        .form-input, .form-select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }
        
        .form-textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            min-height: 80px;
            resize: vertical;
        }
        
        /* 清算预览 */
        .settlement-summary {
            background: #f5f5f5;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 16px;
        }
        
        .settlement-summary-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .settlement-summary-row:last-child {
            border-bottom: none;
        }
        
        .settlement-detail-item {
            padding: 12px;
            border-bottom: 1px solid #f5f5f5;
            display: flex;
            justify-content: space-between;
        }
        
        /* 导出按钮 */
        .export-buttons {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏖️ 年假查询系统</h1>
        </div>
        
        <!-- 用户信息栏 -->
        <div id="userInfo" class="user-info" style="display: none;">
            <span class="name" id="userName"></span>
            <span id="userBadge"></span>
        </div>
        
        <!-- 内容区域 -->
        <div id="content">
            <div class="loading">正在初始化...</div>
        </div>
    </div>
    
    <!-- 详情弹窗 -->
    <div id="detailModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title" id="modalTitle">详情</div>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body" id="modalBody">
                <!-- 动态内容 -->
            </div>
        </div>
    </div>

    <script>
        // ==================== 配置 ====================
        const API_BASE = window.location.hostname === 'localhost' 
            ? 'http://localhost:8000/api' 
            : '/api';
        
        // 飞书 App ID（需要在飞书后台配置）
        // 部署时替换为实际的 App ID
        const FEISHU_APP_ID = window.FEISHU_APP_ID || 'cli_xxxxxxxxxxxxxxxx';
        
        // ==================== 全局状态 ====================
        let currentUser = null;  // 当前登录用户
        let currentEmployee = null;  // 当前查看的员工
        let authToken = localStorage.getItem('leave_auth_token');
        let employees = [];  // 员工列表（HR用）
        
        // ==================== API 调用 ====================
        
        // 带认证的 API 请求
        async function apiRequest(url, options = {}) {
            const headers = {
                'Content-Type': 'application/json',
                ...options.headers
            };
            
            if (authToken) {
                headers['Authorization'] = `Bearer ${authToken}`;
            }
            
            const response = await fetch(url, {
                ...options,
                headers
            });
            
            if (response.status === 401) {
                // Token 过期，清除并重新登录
                localStorage.removeItem('leave_auth_token');
                authToken = null;
                currentUser = null;
                showLoginScreen();
                throw new Error('登录已过期，请重新登录');
            }
            
            return response;
        }
        
        // 飞书免登登录
        async function loginWithFeishu(authCode) {
            const response = await fetch(`${API_BASE}/auth/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ auth_code: authCode })
            });
            
            const result = await response.json();
            
            if (!response.ok) {
                throw new Error(result.detail || '登录失败');
            }
            
            // 保存 token
            authToken = result.token;
            localStorage.setItem('leave_auth_token', authToken);
            
            currentUser = {
                open_id: result.open_id,
                name: result.name,
                employee_id: result.employee_id,
                employee_name: result.employee_name,
                is_hr: result.is_hr
            };
            
            return currentUser;
        }
        
        // 获取当前用户信息
        async function getCurrentUser() {
            const response = await apiRequest(`${API_BASE}/auth/me`);
            const result = await response.json();
            
            if (result.code !== 0) {
                throw new Error(result.message || '获取用户信息失败');
            }
            
            currentUser = result.data;
            return currentUser;
        }
        
        // 获取员工列表
        async function loadEmployees() {
            const response = await apiRequest(`${API_BASE}/employees`);
            const result = await response.json();
            
            if (result.code !== 0) {
                throw new Error(result.message || '加载失败');
            }
            
            employees = result.data;
            return employees;
        }
        
        // 查询年假余额
        async function queryLeaveBalance(employeeId) {
            const response = await apiRequest(
                `${API_BASE}/leave/balance?employee_id=${encodeURIComponent(employeeId)}`
            );
            const result = await response.json();
            
            if (result.code !== 0) {
                throw new Error(result.message || '查询失败');
            }
            
            return result.data;
        }
        
        // 查询请假明细
        async function queryLeaveHistory(employeeId) {
            const response = await apiRequest(
                `${API_BASE}/leave/history?employee_id=${encodeURIComponent(employeeId)}`
            );
            const result = await response.json();
            
            if (result.code !== 0) {
                throw new Error(result.message || '查询失败');
            }
            
            return result.data;
        }
        
        // 查询计算规则
        async function queryLeaveRules(employeeId) {
            const response = await apiRequest(
                `${API_BASE}/leave/rules?employee_id=${encodeURIComponent(employeeId)}`
            );
            const result = await response.json();
            
            if (result.code !== 0) {
                throw new Error(result.message || '查询失败');
            }
            
            return result.data;
        }
        
        // 查询调整记录
        async function queryAdjustments(employeeName, year) {
            const response = await apiRequest(
                `${API_BASE}/admin/adjustments?employee_name=${encodeURIComponent(employeeName)}&year=${year}`
            );
            const result = await response.json();
            
            if (result.code !== 0) {
                throw new Error(result.message || '查询失败');
            }
            
            return result.data;
        }
        
        // 创建调整记录
        async function createAdjustment(data) {
            const response = await apiRequest(`${API_BASE}/admin/adjustments`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            
            const result = await response.json();
            
            if (result.code !== 0) {
                throw new Error(result.message || '创建失败');
            }
            
            return result.data;
        }
        
        // 导出数据
        async function exportData(year, format) {
            const response = await apiRequest(
                `${API_BASE}/admin/export?year=${year}&format=${format}`
            );
            
            if (!response.ok) {
                const result = await response.json();
                throw new Error(result.detail || '导出失败');
            }
            
            // 下载文件
            const blob = await response.blob();
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            
            const contentDisposition = response.headers.get('content-disposition');
            let filename = `年假数据_${year}.${format}`;
            if (contentDisposition) {
                const match = contentDisposition.match(/filename="(.+)"/);
                if (match) filename = match[1];
            }
            
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            window.URL.revokeObjectURL(url);
            document.body.removeChild(a);
        }
        
        // 获取年终清算预览
        async function getYearEndPreview(year) {
            const response = await apiRequest(
                `${API_BASE}/admin/year-end/preview?year=${year}`
            );
            const result = await response.json();
            
            if (result.code !== 0) {
                throw new Error(result.message || '获取预览失败');
            }
            
            return result.data;
        }
        
        // 确认年终清算
        async function confirmYearEndSettlement(year, details) {
            const response = await apiRequest(`${API_BASE}/admin/year-end/confirm`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ year, details })
            });
            
            const result = await response.json();
            
            if (result.code !== 0) {
                throw new Error(result.message || '清算失败');
            }
            
            return result.data;
        }
        
        // ==================== 渲染函数 ====================
        
        // 渲染用户信息和年假（员工视图）
        function renderEmployeeView(data) {
            const annual = data.annual_leave;
            const isNegative = annual.remaining < 0;
            
            // 更新用户信息栏
            document.getElementById('userInfo').style.display = 'block';
            document.getElementById('userName').textContent = currentUser.name;
            document.getElementById('userBadge').innerHTML = currentUser.is_hr 
                ? '<span class="badge">HR</span>' : '';
            
            const html = `
                <div class="balance-card card">
                    <div class="label">剩余年假</div>
                    <div class="number ${isNegative ? 'negative' : ''}">${annual.remaining}</div>
                    <div class="sub">${isNegative ? '已透支' : '可用天数'}</div>
                </div>
                
                <!-- v1.3 三栏展示 -->
                <div class="stats-grid-3">
                    <div class="stat-item">
                        <div class="label">当年额度</div>
                        <div class="number">${annual.current_year.quota || annual.current_year}</div>
                    </div>
                    <div class="stat-item">
                        <div class="label">上年结转</div>
                        <div class="number ${(annual.carryover.quota || annual.carryover) < 0 ? 'negative' : ''}">${annual.carryover.quota || annual.carryover}</div>
                        ${annual.carryover.expire_date ? `<div class="note">${annual.carryover.expire_date}到期</div>` : ''}
                    </div>
                    <div class="stat-item">
                        <div class="label">已使用</div>
                        <div class="number">${annual.total_used || annual.used.net}</div>
                    </div>
                </div>
                
                <div class="menu-list">
                    <div class="menu-item" onclick="showDetail('history')">
                        <div class="menu-icon blue">📋</div>
                        <div class="menu-text">
                            <div class="menu-title">请假明细</div>
                            <div class="menu-desc">查看本年度所有请假记录</div>
                        </div>
                        <div class="menu-arrow">›</div>
                    </div>
                    <div class="menu-item" onclick="showDetail('rules')">
                        <div class="menu-icon green">📖</div>
                        <div class="menu-text">
                            <div class="menu-title">计算规则</div>
                            <div class="menu-desc">了解年假计算方式</div>
                        </div>
                        <div class="menu-arrow">›</div>
                    </div>
                </div>
            `;
            
            document.getElementById('content').innerHTML = html;
        }
        
        // 渲染 HR 视图
        async function renderHRView() {
            document.getElementById('userInfo').style.display = 'block';
            document.getElementById('userName').textContent = currentUser.name;
            document.getElementById('userBadge').innerHTML = '<span class="badge">HR</span>';
            
            // 加载员工列表
            await loadEmployees();
            
            const html = `
                <div class="warning-box">
                    👋 欢迎，HR管理员！请选择员工查看或管理年假信息。
                </div>
                
                <div class="employee-selector">
                    <select id="employeeSelect" onchange="onEmployeeSelect(this.value)">
                        <option value="">请选择员工...</option>
                        ${employees.map(emp => `
                            <option value="${emp.user_id}" data-name="${emp.name}">
                                ${emp.name} ${emp.department ? `(${emp.department})` : ''}
                            </option>
                        `).join('')}
                    </select>
                </div>
                
                <div id="employeeContent"></div>
                
                <div class="card">
                    <h3 style="margin-bottom: 16px;">📊 管理工具</h3>
                    <div class="menu-list">
                        <div class="menu-item" onclick="showExportModal()">
                            <div class="menu-icon purple">📥</div>
                            <div class="menu-text">
                                <div class="menu-title">批量导出</div>
                                <div class="menu-desc">导出全员年假数据报表</div>
                            </div>
                            <div class="menu-arrow">›</div>
                        </div>
                        <div class="menu-item" onclick="showYearEndModal()">
                            <div class="menu-icon orange">🔄</div>
                            <div class="menu-text">
                                <div class="menu-title">年终清算</div>
                                <div class="menu-desc">年度结转与清零处理</div>
                            </div>
                            <div class="menu-arrow">›</div>
                        </div>
                    </div>
                </div>
            `;
            
            document.getElementById('content').innerHTML = html;
        }
        
        // 渲染员工详情（HR视图）
        async function renderEmployeeDetail(employeeId) {
            const employee = employees.find(e => e.user_id === employeeId);
            if (!employee) return;
            
            currentEmployee = { id: employeeId, name: employee.name };
            
            const container = document.getElementById('employeeContent');
            container.innerHTML = '<div class="loading">加载中...</div>';
            
            try {
                const data = await queryLeaveBalance(employeeId);
                const annual = data.annual_leave;
                const isNegative = annual.remaining < 0;
                
                container.innerHTML = `
                    <div class="card">
                        <h3 style="margin-bottom: 16px;">${employee.name} 的年假信息</h3>
                        
                        <div class="stats-grid-3">
                            <div class="stat-item">
                                <div class="label">当年额度</div>
                                <div class="number">${annual.current_year.quota || annual.current_year}</div>
                            </div>
                            <div class="stat-item">
                                <div class="label">上年结转</div>
                                <div class="number">${annual.carryover.quota || annual.carryover}</div>
                            </div>
                            <div class="stat-item">
                                <div class="label">剩余</div>
                                <div class="number ${isNegative ? 'negative' : ''}">${annual.remaining}</div>
                            </div>
                        </div>
                        
                        <div class="btn-group">
                            <button class="btn btn-primary" onclick="showDetail('history')">请假明细</button>
                            <button class="btn btn-secondary" onclick="showDetail('rules')">计算规则</button>
                            <button class="btn btn-primary" onclick="showAdjustmentModal()">调整额度</button>
                        </div>
                    </div>
                `;
            } catch (error) {
                container.innerHTML = `<div class="error">❌ ${error.message}</div>`;
            }
        }
        
        // 渲染请假明细
        function renderLeaveHistory(data) {
            let html = '';
            
            if (data.records && data.records.length > 0) {
                html += `<div style="margin-bottom: 16px; padding: 12px; background: #f5f5f5; border-radius: 8px;">
                    <strong>统计：</strong>年假 ${data.summary.annual_leave_used}天 / 事假 ${data.summary.personal_leave_used}天
                </div>`;
                
                data.records.forEach(record => {
                    const statusClass = record.status === '已通过' ? 'approved' : 'withdrawn';
                    html += `
                        <div class="leave-item">
                            <div class="leave-header">
                                <span class="leave-type">${record.type}</span>
                                <span class="leave-duration">${record.duration}天</span>
                            </div>
                            <div class="leave-date">${record.start_date} - ${record.end_date}</div>
                            <span class="leave-status ${statusClass}">${record.status}</span>
                            ${record.reason ? `<div class="leave-reason">${record.reason}</div>` : ''}
                        </div>
                    `;
                });
            } else {
                html = '<div class="empty-state">暂无请假记录</div>';
            }
            
            return html;
        }
        
        // 渲染计算规则
        function renderLeaveRules(data) {
            const legal = data.legal_leave;
            const welfare = data.welfare_leave;
            const cap = data.cap;
            const emp = data.employee;
            
            return `
                <div class="rule-section">
                    <div class="rule-title">员工信息</div>
                    <div class="rule-item">
                        <span class="rule-label">姓名</span>
                        <span class="rule-value">${emp.name}</span>
                    </div>
                    <div class="rule-item">
                        <span class="rule-label">社保工龄</span>
                        <span class="rule-value">${emp.social_security_months}个月</span>
                    </div>
                    <div class="rule-item">
                        <span class="rule-label">司龄</span>
                        <span class="rule-value">${emp.service_years}年 (${emp.service_months}个月)</span>
                    </div>
                </div>
                
                <div class="rule-section">
                    <div class="rule-title">法定年假</div>
                    <div class="rule-item">
                        <span class="rule-label">社保工龄</span>
                        <span class="rule-value">${legal.base_months}个月</span>
                    </div>
                    <div class="rule-item">
                        <span class="rule-label">年假天数</span>
                        <span class="rule-value">${legal.days}天</span>
                    </div>
                    <div class="rule-item" style="background: #f5f5f5; margin: 0 -20px; padding: 12px 20px;">
                        <span class="rule-label" style="color: #666; font-size: 13px;">${legal.description}</span>
                    </div>
                </div>
                
                <div class="rule-section">
                    <div class="rule-title">福利年假</div>
                    <div class="rule-item">
                        <span class="rule-label">司龄年数</span>
                        <span class="rule-value">${welfare.service_years}年</span>
                    </div>
                    <div class="rule-item">
                        <span class="rule-label">年假天数</span>
                        <span class="rule-value">${welfare.days}天</span>
                    </div>
                    <div class="rule-item" style="background: #f5f5f5; margin: 0 -20px; padding: 12px 20px;">
                        <span class="rule-label" style="color: #666; font-size: 13px;">${welfare.description}</span>
                    </div>
                </div>
                
                <div class="rule-section">
                    <div class="rule-title">封顶规则</div>
                    <div class="rule-item">
                        <span class="rule-label">小计</span>
                        <span class="rule-value">${cap.subtotal}天</span>
                    </div>
                    <div class="rule-item">
                        <span class="rule-label">封顶后</span>
                        <span class="rule-value">${cap.capped}天</span>
                    </div>
                    ${cap.applied ? `
                    <div class="rule-item" style="background: #fff3e0; margin: 0 -20px; padding: 12px 20px;">
                        <span class="rule-label" style="color: #ef6c00;">已应用封顶限制</span>
                    </div>
                    ` : ''}
                </div>
            `;
        }
        
        // 渲染调整记录
        async function renderAdjustments(employeeName, year) {
            try {
                const data = await queryAdjustments(employeeName, year);
                
                if (data.adjustments.length === 0) {
                    return '<div class="empty-state">暂无调整记录</div>';
                }
                
                return data.adjustments.map(adj => `
                    <div class="adjustment-item">
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <span class="adjustment-amount ${adj.adjust_amount >= 0 ? 'positive' : 'negative'}">
                                ${adj.adjust_amount >= 0 ? '+' : ''}${adj.adjust_amount}天
                            </span>
                            <span style="font-size: 12px; color: #999;">${adj.created_at}</span>
                        </div>
                        <div style="margin-top: 4px; font-size: 14px;">${adj.reason || '无备注'}</div>
                        <div class="adjustment-meta">
                            操作人: ${adj.created_by} | 类型: ${adj.adjustment_type === 'year_end_carryover' ? '年终结转' : '手动调整'}
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                return `<div class="error">❌ ${error.message}</div>`;
            }
        }
        
        // 显示错误
        function showError(message) {
            document.getElementById('content').innerHTML = `
                <div class="error">❌ ${message}</div>
                <button class="btn btn-primary" onclick="location.reload()" style="margin-top: 16px;">
                    重新加载
                </button>
            `;
        }
        
        // ==================== 弹窗控制 ====================
        
        async function showDetail(type) {
            if (!currentEmployee) return;
            
            const modal = document.getElementById('detailModal');
            const title = document.getElementById('modalTitle');
            const body = document.getElementById('modalBody');
            
            modal.classList.add('active');
            body.innerHTML = '<div class="loading">加载中...</div>';
            
            try {
                if (type === 'history') {
                    title.textContent = '请假明细';
                    const data = await queryLeaveHistory(currentEmployee.id);
                    body.innerHTML = renderLeaveHistory(data);
                } else if (type === 'rules') {
                    title.textContent = '计算规则';
                    const data = await queryLeaveRules(currentEmployee.id);
                    body.innerHTML = renderLeaveRules(data);
                } else if (type === 'adjustments') {
                    title.textContent = '调整记录';
                    body.innerHTML = await renderAdjustments(currentEmployee.name, new Date().getFullYear());
                }
            } catch (error) {
                body.innerHTML = `<div class="error">❌ ${error.message}</div>`;
            }
        }
        
        function closeModal() {
            document.getElementById('detailModal').classList.remove('active');
        }
        
        // 点击弹窗外部关闭
        document.getElementById('detailModal').addEventListener('click', (e) => {
            if (e.target.id === 'detailModal') {
                closeModal();
            }
        });
        
        // ==================== HR 功能 ====================
        
        // 员工选择
        async function onEmployeeSelect(employeeId) {
            if (!employeeId) {
                document.getElementById('employeeContent').innerHTML = '';
                return;
            }
            await renderEmployeeDetail(employeeId);
        }
        
        // 显示调整弹窗
        function showAdjustmentModal() {
            const modal = document.getElementById('detailModal');
            const title = document.getElementById('modalTitle');
            const body = document.getElementById('modalBody');
            
            modal.classList.add('active');
            title.textContent = '调整年假额度';
            
            body.innerHTML = `
                <div class="form-group">
                    <label class="form-label">员工</label>
                    <input type="text" class="form-input" value="${currentEmployee.name}" disabled>
                </div>
                <div class="form-group">
                    <label class="form-label">调整额度（天）</label>
                    <input type="number" class="form-input" id="adjAmount" step="0.5" placeholder="正数增加，负数减少">
                    <div style="font-size: 12px; color: #999; margin-top: 4px;">例如：+1.5 或 -0.5</div>
                </div>
                <div class="form-group">
                    <label class="form-label">调整原因</label>
                    <textarea class="form-textarea" id="adjReason" placeholder="请说明调整原因..."></textarea>
                </div>
                <div class="btn-group">
                    <button class="btn btn-primary" onclick="submitAdjustment()">确认调整</button>
                    <button class="btn btn-secondary" onclick="closeModal()">取消</button>
                </div>
            `;
        }
        
        // 提交调整
        async function submitAdjustment() {
            const amount = parseFloat(document.getElementById('adjAmount').value);
            const reason = document.getElementById('adjReason').value;
            
            if (isNaN(amount)) {
                alert('请输入有效的调整额度');
                return;
            }
            
            if (!reason.trim()) {
                alert('请输入调整原因');
                return;
            }
            
            try {
                await createAdjustment({
                    employee_name: currentEmployee.name,
                    year: new Date().getFullYear(),
                    adjust_amount: amount,
                    reason: reason
                });
                
                alert('调整成功！');
                closeModal();
                // 刷新员工详情
                await renderEmployeeDetail(currentEmployee.id);
            } catch (error) {
                alert('调整失败: ' + error.message);
            }
        }
        
        // 显示导出弹窗
        function showExportModal() {
            const modal = document.getElementById('detailModal');
            const title = document.getElementById('modalTitle');
            const body = document.getElementById('modalBody');
            
            modal.classList.add('active');
            title.textContent = '批量导出年假数据';
            
            const currentYear = new Date().getFullYear();
            
            body.innerHTML = `
                <div class="form-group">
                    <label class="form-label">导出年份</label>
                    <select class="form-select" id="exportYear">
                        <option value="${currentYear}">${currentYear}年</option>
                        <option value="${currentYear - 1}">${currentYear - 1}年</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">导出格式</label>
                    <div class="export-buttons">
                        <button class="btn btn-primary" onclick="doExport('csv')">导出 CSV</button>
                        <button class="btn btn-primary" onclick="doExport('xlsx')">导出 Excel</button>
                    </div>
                </div>
                <div style="font-size: 12px; color: #999; margin-top: 16px;">
                    导出字段：姓名、工号、入职日期、司龄、当年额度、上年结转、已用天数、余额、调整记录
                </div>
            `;
        }
        
        // 执行导出
        async function doExport(format) {
            const year = document.getElementById('exportYear').value;
            
            try {
                await exportData(year, format);
                closeModal();
            } catch (error) {
                alert('导出失败: ' + error.message);
            }
        }
        
        // 显示年终清算弹窗
        let yearEndPreviewData = null;
        
        function showYearEndModal() {
            const modal = document.getElementById('detailModal');
            const title = document.getElementById('modalTitle');
            const body = document.getElementById('modalBody');
            
            modal.classList.add('active');
            title.textContent = '年终清算';
            
            const currentYear = new Date().getFullYear();
            
            body.innerHTML = `
                <div class="form-group">
                    <label class="form-label">清算年份</label>
                    <select class="form-select" id="settlementYear">
                        <option value="${currentYear - 1}">${currentYear - 1}年</option>
                        <option value="${currentYear}">${currentYear}年</option>
                    </select>
                </div>
                <div class="btn-group">
                    <button class="btn btn-primary" onclick="previewYearEnd()">预览清算</button>
                    <button class="btn btn-secondary" onclick="closeModal()">取消</button>
                </div>
                <div id="settlementPreview"></div>
            `;
        }
        
        // 预览年终清算
        async function previewYearEnd() {
            const year = parseInt(document.getElementById('settlementYear').value);
            const previewDiv = document.getElementById('settlementPreview');
            
            previewDiv.innerHTML = '<div class="loading">正在计算...</div>';
            
            try {
                const data = await getYearEndPreview(year);
                yearEndPreviewData = data;
                
                const carryoverEmployees = data.details.filter(d => d.carryover_days > 0);
                const clearedEmployees = data.details.filter(d => d.cleared_days > 0);
                
                previewDiv.innerHTML = `
                    <div class="settlement-summary" style="margin-top: 16px;">
                        <div class="settlement-summary-row">
                            <span>清算年份</span>
                            <span>${data.year}年</span>
                        </div>
                        <div class="settlement-summary-row">
                            <span>涉及员工</span>
                            <span>${data.total_employees}人</span>
                        </div>
                        <div class="settlement-summary-row">
                            <span>应结转天数</span>
                            <span style="color: #4caf50; font-weight: 600;">${data.total_carryover}天</span>
                        </div>
                        <div class="settlement-summary-row">
                            <span>应清零天数</span>
                            <span style="color: #f44336; font-weight: 600;">${data.total_cleared}天</span>
                        </div>
                    </div>
                    
                    ${carryoverEmployees.length > 0 ? `
                    <div style="margin-top: 16px;">
                        <div style="font-weight: 600; margin-bottom: 8px;">结转明细（前5条）</div>
                        ${carryoverEmployees.slice(0, 5).map(e => `
                            <div class="settlement-detail-item">
                                <span>${e.employee_name}</span>
                                <span>年末${e.year_end_balance}天 → 结转${e.carryover_days}天</span>
                            </div>
                        `).join('')}
                        ${carryoverEmployees.length > 5 ? `<div style="text-align: center; color: #999; padding: 8px;">...还有${carryoverEmployees.length - 5}人</div>` : ''}
                    </div>
                    ` : '<div style="margin-top: 16px; color: #999;">无需结转</div>'}
                    
                    <div class="btn-group" style="margin-top: 16px;">
                        <button class="btn btn-danger" onclick="confirmYearEnd()">确认清算</button>
                        <button class="btn btn-secondary" onclick="closeModal()">取消</button>
                    </div>
                    
                    <div class="warning-box" style="margin-top: 16px;">
                        ⚠️ 确认后将自动生成下一年度的结转调整记录，此操作不可撤销！
                    </div>
                `;
            } catch (error) {
                previewDiv.innerHTML = `<div class="error">❌ ${error.message}</div>`;
            }
        }
        
        // 确认年终清算
        async function confirmYearEnd() {
            if (!yearEndPreviewData) return;
            
            if (!confirm('确定要执行年终清算吗？此操作将生成结转记录并不可撤销。')) {
                return;
            }
            
            try {
                const result = await confirmYearEndSettlement(
                    yearEndPreviewData.year,
                    yearEndPreviewData.details.map(d => ({
                        employee_name: d.employee_name,
                        year_end_balance: d.year_end_balance,
                        carryover_days: d.carryover_days,
                        cleared_days: d.cleared_days
                    }))
                );
                
                alert(`清算完成！\n涉及员工：${result.total_employees}人\n结转天数：${result.total_carryover}天\n清零天数：${result.total_cleared}天`);
                closeModal();
            } catch (error) {
                alert('清算失败: ' + error.message);
            }
        }
        
        // ==================== 初始化流程 ====================
        
        // 显示登录界面
        function showLoginScreen() {
            document.getElementById('content').innerHTML = `
                <div class="card" style="text-align: center;">
                    <div style="font-size: 48px; margin-bottom: 16px;">🔐</div>
                    <h2 style="margin-bottom: 8px;">请登录</h2>
                    <p style="color: #999; margin-bottom: 24px;">使用飞书账号登录查看年假信息</p>
                    <button class="btn btn-primary" onclick="doLogin()" style="padding: 12px 32px; font-size: 16px;">
                        飞书免登登录
                    </button>
                </div>
            `;
        }
        
        // 执行飞书登录
        async function doLogin() {
            document.getElementById('content').innerHTML = '<div class="loading">正在获取授权...</div>';
            
            try {
                // 检查是否在飞书环境中
                if (typeof tt === 'undefined') {
                    // 非飞书环境，显示提示
                    document.getElementById('content').innerHTML = `
                        <div class="error">
                            请在飞书客户端中打开此应用
                        </div>
                        <div style="margin-top: 16px; padding: 16px; background: #f5f5f5; border-radius: 8px;">
                            <p style="font-size: 14px; color: #666; margin-bottom: 8px;">
                                开发测试模式：可以使用以下方式登录
                            </p>
                            <button class="btn btn-secondary" onclick="devLogin()" style="margin-top: 8px;">
                                开发测试登录
                            </button>
                        </div>
                    `;
                    return;
                }
                
                // 飞书免登
                tt.requestAuthCode({
                    appId: FEISHU_APP_ID,
                    success: async (res) => {
                        try {
                            document.getElementById('content').innerHTML = '<div class="loading">正在登录...</div>';
                            await loginWithFeishu(res.code);
                            await initApp();
                        } catch (error) {
                            showError('登录失败: ' + error.message);
                        }
                    },
                    fail: (err) => {
                        showError('获取授权码失败: ' + JSON.stringify(err));
                    }
                });
            } catch (error) {
                showError('登录初始化失败: ' + error.message);
            }
        }
        
        // 开发测试登录
        async function devLogin() {
            // 开发环境使用模拟 token
            authToken = 'dev_token_' + Date.now();
            localStorage.setItem('leave_auth_token', authToken);
            currentUser = {
                name: '测试用户',
                is_hr: true,
                employee_id: 'test_001'
            };
            await initApp();
        }
        
        // 初始化应用
        async function initApp() {
            document.getElementById('content').innerHTML = '<div class="loading">加载中...</div>';
            
            try {
                // 获取当前用户信息
                if (!currentUser) {
                    currentUser = await getCurrentUser();
                }
                
                if (currentUser.is_hr) {
                    // HR 视图
                    await renderHRView();
                } else if (currentUser.employee_id) {
                    // 员工视图 - 自动显示自己的年假
                    currentEmployee = {
                        id: currentUser.employee_id,
                        name: currentUser.employee_name || currentUser.name
                    };
                    const data = await queryLeaveBalance(currentUser.employee_id);
                    renderEmployeeView(data);
                } else {
                    // 未匹配到员工
                    document.getElementById('content').innerHTML = `
                        <div class="error">
                            未找到您的员工信息，请联系 HR 补充「飞书Open ID」字段
                        </div>
                    `;
                }
            } catch (error) {
                if (error.message.includes('登录已过期')) {
                    return; // 已显示登录界面
                }
                showError('初始化失败: ' + error.message);
            }
        }
        
        // 页面加载时检查登录状态
        async function checkLogin() {
            if (authToken) {
                await initApp();
            } else {
                showLoginScreen();
            }
        }
        
        // 启动
        checkLogin();
    </script>
</body>
</html>
